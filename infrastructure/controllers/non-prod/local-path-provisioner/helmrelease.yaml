apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: local-path-storage

  chart:
    spec:
      chart: local-path-provisioner
      version: "0.0.37"
      sourceRef:
        kind: HelmRepository
        name: local-path-provisioner
        namespace: flux-system

  values:
    storageClass:
      defaultClass: true
