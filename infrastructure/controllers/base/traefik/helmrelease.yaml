apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m

  chart:
    spec:
      chart: traefik
      version: "40.1.0"
      sourceRef:
        kind: HelmRepository
        name: traefik

  install:
    createNamespace: true

  values:
    deployment:
      replicas: 1

    ingressClass:
      enabled: true
      isDefaultClass: true

    service:
      type: LoadBalancer

    ports:
      web:
        redirectTo:
          port: websecure

    logs:
      general:
        level: INFO

    additionalArguments:
      - "--api.dashboard=true"

    providers:
      kubernetesCRD:
        enabled: true
      kubernetesIngress:
        enabled: true
