apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 30m

  chart:
    spec:
      chart: metallb
      version: "0.15.*"
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system

  install:
    createNamespace: true

  upgrade:
    crds: CreateReplace

  values:
    speaker:
      tolerateMaster: true

    controller:
      logLevel: info
