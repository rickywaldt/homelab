apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb

spec:
  interval: 30m

  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
    crds: CreateReplace

  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
    crds: CreateReplace

  chart:
    spec:
      chart: metallb
      version: 0.15.3
      sourceRef:
        kind: HelmRepository
        name: metallb
      interval: 12h

  values:
    crds:
      enabled: true
