apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      version: 12.0.0
      sourceRef:
        kind: HelmRepository
        name: velero
  values:
    credentials:
      useSecret: true
      existingSecret: velero-s3-credentials

    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero
          default: true
          config:
            region: auto # required by Cloudflare R2
            s3ForcePathStyle: "false"
            s3Url: https://<ACCOUNT_ID>.r2.cloudflarestorage.com

      volumeSnapshotLocation:
        - name: default
          provider: csi

      defaultBackupTTL: "168h" # 7 days
      features: EnableCSI

    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.1
        volumeMounts:
          - mountPath: /target
            name: plugins

    # Talos: non-root, no privilege escalation
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65534
      fsGroup: 65534

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 65534

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    deployNodeAgent: true
    nodeAgent:
      podSecurityContext:
        runAsUser: 0
        runAsNonRoot: false
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true # set false if no prometheus-operator
