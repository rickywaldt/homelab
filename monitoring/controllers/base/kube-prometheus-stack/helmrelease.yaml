apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring

spec:
  interval: 30m

  chart:
    spec:
      chart: kube-prometheus-stack
      version: "69.2.4"

      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring

      interval: 12h

  valuesFrom:
    - kind: Secret
      name: kube-prometheus-stack-values
      valuesKey: values.yaml

  install:
    crds: Create

  upgrade:
    crds: CreateReplace

  driftDetection:
    mode: enabled
    ignore:
      - paths:
          - /metadata/annotations/prometheus-operator-validated
        target:
          kind: PrometheusRule

  values:
    grafana:
      ingress:
        enabled: true
        ingressClassName: traefik

        hosts:
          - grafana.nusanative.com

        tls:
          - secretName: grafana-tls-secret
            hosts:
              - grafana.nusanative.com
